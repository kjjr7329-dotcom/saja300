<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#6246EA">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>하루 1분 사자성어</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --p:#6246EA;--p2:#7C5CE4;--pl:#F0EDFE;--pd:#4A35C8;
  --g0:#FAFAFA;--g1:#F4F4F5;--g2:#E4E4E7;--g3:#A1A1AA;--g4:#71717A;--g5:#3F3F46;--g6:#18181B;
  --green:#10B981;--amber:#F59E0B;--red:#EF4444;
  --white:#fff;
  --nav:60px;
  --st:env(safe-area-inset-top,0px);
  --sb:env(safe-area-inset-bottom,0px);
  --r:14px;
}
html,body{height:100%;background:#EEEAF8;font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;color:var(--g6)}
#app{display:flex;flex-direction:column;height:100dvh;max-width:430px;margin:0 auto;background:var(--white);position:relative;overflow:hidden}

/* ── 헤더 ── */
.hd{background:var(--p);padding:0 20px;padding-top:var(--st);min-height:54px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.hd h1{font-size:16px;font-weight:600;color:white;flex:1;letter-spacing:-.2px}
.hd-badge{font-size:11px;background:rgba(255,255,255,0.15);color:white;padding:3px 10px;border-radius:999px;font-weight:500}
.hd-back{cursor:pointer;padding:6px 6px 6px 0;display:flex;align-items:center;color:white}
.hd-icon{font-size:20px}

/* ── 검색 ── */
.srch{background:var(--p);padding:0 20px 14px;flex-shrink:0}
.srch-box{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.12);border-radius:10px;padding:9px 14px;border:1px solid rgba(255,255,255,0.1)}
.srch-box input{flex:1;border:none;background:transparent;color:white;font-size:14px;outline:none}
.srch-box input::placeholder{color:rgba(255,255,255,0.45)}
.srch-ico{color:rgba(255,255,255,0.5)}
.clr{color:rgba(255,255,255,0.6);cursor:pointer;font-size:17px;display:none;line-height:1}

/* ── 필터 ── */
.frow{display:flex;gap:6px;padding:12px 20px;overflow-x:auto;flex-shrink:0;scrollbar-width:none;background:var(--white);border-bottom:1px solid var(--g2)}
.frow::-webkit-scrollbar{display:none}
.chip{padding:5px 14px;border-radius:999px;font-size:12px;font-weight:500;border:1.5px solid var(--g2);background:var(--white);color:var(--g4);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
.chip.on{background:var(--p);border-color:var(--p);color:white}

/* ── 리스트 ── */
.lst{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:6px 0 calc(var(--nav) + var(--sb) + 8px)}
.si{display:flex;align-items:center;gap:14px;padding:12px 20px;border-bottom:1px solid var(--g1);cursor:pointer;transition:background .1s}
.si:active{background:var(--g0)}
.si-img{width:44px;height:44px;border-radius:10px;object-fit:cover;background:var(--pl);flex-shrink:0}
.si-ph{width:44px;height:44px;border-radius:10px;background:var(--pl);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.si-info{flex:1;min-width:0}
.si-hanja{font-size:15px;font-weight:700;color:var(--g6);letter-spacing:.3px}
.si-kor{font-size:12px;color:var(--g4);margin-top:1px;font-weight:500}
.si-mean{font-size:11px;color:var(--g3);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.si-r{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0}
.lv{width:6px;height:6px;border-radius:50%}
.lv1{background:var(--green)}.lv2{background:var(--amber)}.lv3{background:var(--red)}
.bmi{font-size:15px;line-height:1}

/* ── 빈 상태 ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:70px 20px;color:var(--g3);gap:10px;font-size:13px}

/* ── 하단 네비 ── */
.bnav{position:absolute;bottom:0;left:0;right:0;height:calc(var(--nav) + var(--sb));padding-bottom:var(--sb);background:var(--white);border-top:1px solid var(--g2);display:flex;align-items:center;z-index:100}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px;cursor:pointer}
.nb svg{width:20px;height:20px}
.nb span{font-size:10px;font-weight:500}
.nb.on{color:var(--p)}
.nb:not(.on){color:var(--g3)}

/* ── 슬라이드 스크린 ── */
.scr{position:absolute;inset:0;background:var(--white);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);z-index:200}
.scr.on{transform:translateX(0)}
.shd{background:var(--p);padding:0 20px;padding-top:var(--st);min-height:54px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.shd h2{font-size:16px;font-weight:600;color:white;flex:1}
.shd-cnt{font-size:11px;color:rgba(255,255,255,.7)}
.sscr{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:40px}

/* ── 상세 ── */
.dhero{background:var(--p);padding:22px 20px 26px;color:white;position:relative}
.dhero-hanja{font-size:32px;font-weight:800;letter-spacing:2px;margin-bottom:3px}
.dhero-kor{font-size:15px;font-weight:500;opacity:.8;margin-bottom:12px}
.dhero-tags{display:flex;gap:6px;flex-wrap:wrap}
.dtag{font-size:11px;padding:3px 10px;border-radius:999px;background:rgba(255,255,255,.15);font-weight:500}
.dbm{position:absolute;top:16px;right:16px;font-size:22px;cursor:pointer;padding:4px}

.dbody{padding:0 20px}
.dc{background:var(--g0);border-radius:var(--r);padding:16px;margin-top:12px}
.dct{font-size:11px;font-weight:600;color:var(--p);letter-spacing:.5px;margin-bottom:8px;text-transform:uppercase}
.dcv{font-size:14px;color:var(--g5);line-height:1.8}
.dcv.big{font-size:15px;color:var(--g6);font-weight:500;line-height:1.7}

/* 영상 */
.vwrap{border-radius:10px;overflow:hidden;background:#000;margin-top:8px}
.vratio{padding-top:56.25%;position:relative}
.vratio iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
.novid{padding:16px;text-align:center;color:var(--g3);font-size:13px}
.ytbtn{display:flex;align-items:center;justify-content:center;gap:8px;background:#FF0000;color:white;border-radius:10px;padding:11px;font-size:13px;font-weight:600;text-decoration:none;margin-top:8px}
.blogbtn{display:flex;align-items:center;justify-content:center;gap:8px;background:#03C75A;color:white;border-radius:10px;padding:11px;font-size:13px;font-weight:600;text-decoration:none;margin-top:8px}

/* 캐릭터 */
.cb{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--g2)}
.cb:last-child{border-bottom:none}
.cav{width:38px;height:38px;border-radius:50%;background:var(--pl);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.cn{font-size:11px;font-weight:600;color:var(--g4);margin-bottom:3px}
.ct{font-size:13px;color:var(--g5);line-height:1.65}

/* 복습 버튼 */
.bmtog{display:flex;align-items:center;justify-content:center;gap:6px;border:1.5px solid var(--g2);border-radius:10px;padding:12px;font-size:13px;font-weight:600;cursor:pointer;margin-top:12px;background:var(--white);color:var(--g5);width:100%;transition:all .15s}
.bmtog.on{background:var(--pl);border-color:var(--p);color:var(--p)}

/* ── 복습 노트 ── */
.ne{text-align:center;padding:70px 20px;color:var(--g3);font-size:13px;line-height:2}
.nl{padding:8px 20px}
.ni{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--g1);cursor:pointer}
.ni:last-child{border-bottom:none}
.ni:active{opacity:.6}
.ni-hanja{font-size:15px;font-weight:700}
.ni-kor{font-size:12px;color:var(--g4);margin-top:1px}
.ni-mean{font-size:11px;color:var(--g3);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:180px}
.ndel{color:var(--g3);font-size:18px;margin-left:auto;padding:4px 8px;flex-shrink:0}

/* ── 앱 정보 ── */
.iw{padding:24px 20px}
.ilogo{text-align:center;padding:10px 0 24px}
.ilogo-ic{font-size:52px}
.ilogo-name{font-size:19px;font-weight:700;color:var(--p);margin-top:8px}
.ilogo-sub{font-size:12px;color:var(--g3);margin-top:3px}
.ic{background:var(--g0);border-radius:var(--r);padding:16px;margin-bottom:12px}
.ic h3{font-size:11px;font-weight:600;color:var(--p);letter-spacing:.5px;margin-bottom:10px}
.ir{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;color:var(--g4);border-bottom:1px solid var(--g2)}
.ir:last-child{border-bottom:none}
.ir span:last-child{font-weight:600;color:var(--g6)}
.ilink{display:flex;align-items:center;gap:8px;padding:12px 14px;border-radius:10px;font-size:13px;font-weight:600;text-decoration:none;margin-bottom:8px;color:white}
.ilink.yt{background:#FF0000}
.ilink.blog{background:#03C75A}
.ilink svg{width:17px;height:17px;flex-shrink:0}
.icopy{text-align:center;font-size:11px;color:var(--g3);margin-top:16px;line-height:1.8}

/* 홈 버튼 (복습/정보 탭 하단) */
.homebtn{display:flex;align-items:center;justify-content:center;gap:6px;background:var(--p);color:white;border-radius:10px;padding:13px;font-size:13px;font-weight:600;cursor:pointer;margin:16px 20px 0;border:none;width:calc(100% - 40px)}
.homebtn svg{width:16px;height:16px}
</style>
</head>
<body>
<div id="app">

  <!-- 메인 -->
  <div id="ms">
    <header class="hd">
      <span class="hd-icon">🐯</span>
      <h1>하루 1분 사자성어</h1>
      <span class="hd-badge" id="cbadge">0개</span>
    </header>
    <div class="srch">
      <div class="srch-box">
        <svg class="srch-ico" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="si" placeholder="한자·독음·뜻 검색…" oninput="onSrch(this.value)">
        <span class="clr" id="clr" onclick="clrSrch()">×</span>
      </div>
    </div>
    <div class="frow" id="frow">
      <div class="chip on" onclick="setF('전체',this)">전체</div>
    </div>
    <div class="lst" id="lw"></div>
  </div>

  <!-- 상세 -->
  <div class="scr" id="ds">
    <div class="shd">
      <div class="hd-back" onclick="closeDet()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg>
      </div>
      <h2 id="dt">상세보기</h2>
      <div style="font-size:20px;cursor:pointer;padding:6px 0 6px 8px" id="dtbm" onclick="togBm()">🤍</div>
    </div>
    <div class="sscr" id="db"></div>
  </div>

  <!-- 복습 노트 -->
  <div class="scr" id="ns">
    <div class="shd">
      <h2 style="flex:1">복습 노트</h2>
      <span class="shd-cnt" id="ncnt">0개</span>
    </div>
    <div class="sscr">
      <div id="nb2"></div>
      <button class="homebtn" onclick="goHome()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        사자성어 숲으로 돌아가기
      </button>
    </div>
  </div>

  <!-- 앱 정보 -->
  <div class="scr" id="is">
    <div class="shd"><h2 style="flex:1">앱 정보</h2></div>
    <div class="sscr">
      <div class="iw" id="ib"></div>
      <button class="homebtn" onclick="goHome()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        사자성어 숲으로 돌아가기
      </button>
    </div>
  </div>

  <!-- 하단 네비 -->
  <nav class="bnav">
    <div class="nb on" id="nh" onclick="goHome()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>사자성어 숲</span>
    </div>
    <div class="nb" id="nn" onclick="goNote()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      <span>복습 노트</span>
    </div>
    <div class="nb" id="ni2" onclick="goInfo()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span>앱 정보</span>
    </div>
  </nav>
</div>

<script>
const BLOG='https://blog.naver.com/daddygom24';
const YTCH='https://www.youtube.com/@storyhacker';

let all=[],filt=[],curF='전체',cur=null;
let bms=JSON.parse(localStorage.getItem('saja_bm')||'[]');

function driveT(u){if(!u)return null;const m=u.match(/\/d\/([a-zA-Z0-9_-]+)/);return m?`https://drive.google.com/thumbnail?id=${m[1]}&sz=w120`:null}
function ytId(u){if(!u)return null;const m=u.match(/shorts\/([a-zA-Z0-9_-]+)|youtu\.be\/([a-zA-Z0-9_-]+)|[?&]v=([a-zA-Z0-9_-]+)/);return m?(m[1]||m[2]||m[3]):null}
function lvC(l){return l==1?'lv1':l==2?'lv2':'lv3'}
function lvL(l){return l==1?'기초':l==2?'중급':'고급'}
function isBm(id){return bms.includes(id)}

async function load(){
  const r=await fetch('data.json');
  all=await r.json();
  buildF();applyF();
}

function buildF(){
  const cats=[...new Set(all.map(d=>d.Category).filter(Boolean))].sort();
  const row=document.getElementById('frow');
  cats.forEach(c=>{
    const el=document.createElement('div');
    el.className='chip';el.textContent=c;
    el.onclick=()=>setF(c,el);row.appendChild(el);
  });
}

function setF(cat,el){
  curF=cat;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
  el.classList.add('on');applyF();
}

function onSrch(q){
  document.getElementById('clr').style.display=q?'block':'none';applyF();
}
function clrSrch(){
  document.getElementById('si').value='';
  document.getElementById('clr').style.display='none';applyF();
}

function applyF(){
  const q=document.getElementById('si').value.trim().toLowerCase();
  filt=all.filter(d=>{
    const mc=curF==='전체'||d.Category===curF;
    const mq=!q||(d['한자 성어']||'').toLowerCase().includes(q)||(d['한글 독음']||'').toLowerCase().includes(q)||(d['의미 (뜻풀이)']||'').toLowerCase().includes(q)||(d['검색_태그']||'').toLowerCase().includes(q);
    return mc&&mq;
  });
  renderList();
  document.getElementById('cbadge').textContent=filt.length+'개';
}

function renderList(){
  const w=document.getElementById('lw');
  if(!filt.length){w.innerHTML='<div class="empty"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><p>검색 결과가 없어요</p></div>';return;}
  const f=document.createDocumentFragment();
  filt.forEach(item=>{
    const d=document.createElement('div');
    d.className='si';d.onclick=()=>openDet(item);
    const th=driveT(item['캐릭터_이미지_URL']);
    const tHtml=th?`<img class="si-img" src="${th}" alt="" loading="lazy" onerror="this.outerHTML='<div class=\'si-ph\'>🐯</div>'">`:'<div class="si-ph">🐯</div>';
    const mn=(item['의미 (뜻풀이)']||'').substring(0,26)+((item['의미 (뜻풀이)']||'').length>26?'…':'');
    d.innerHTML=`${tHtml}<div class="si-info"><div class="si-hanja">${item['한자 성어']||''}</div><div class="si-kor">${item['한글 독음']||''}</div><div class="si-mean">${mn}</div></div><div class="si-r"><div class="lv ${lvC(item.Level)}"></div><div class="bmi">${isBm(item.ID)?'🧡':'🤍'}</div></div>`;
    f.appendChild(d);
  });
  w.innerHTML='';w.appendChild(f);
}

function openDet(item){
  cur=item;
  document.getElementById('dt').textContent=item['한글 독음']||'';
  document.getElementById('dtbm').textContent=isBm(item.ID)?'🧡':'🤍';
  const vid=ytId(item['유튜브_쇼츠_URL']);
  const bsUrl=`${BLOG}?Redirect=Search&jetSearch=${encodeURIComponent(item['한글 독음']||'')}`;
  const vidHtml=vid
    ?`<div class="vwrap"><div class="vratio"><iframe src="https://www.youtube.com/embed/${vid}?rel=0" allowfullscreen allow="autoplay;encrypted-media"></iframe></div></div><a class="ytbtn" href="https://youtube.com/shorts/${vid}" target="_blank"><svg viewBox="0 0 24 24" fill="white" width="16" height="16"><path d="M23 7s-.3-2-1.2-2.8c-1.1-1.2-2.4-1.2-3-1.3C16.2 2.8 12 2.8 12 2.8s-4.2 0-6.8.2c-.6.1-1.9.1-3 1.3C1.3 5 1 7 1 7S.7 9.1.7 11.2v2c0 2 .3 4.1.3 4.1s.3 2 1.2 2.8c1.1 1.2 2.6 1.1 3.3 1.2C7.3 21.4 12 21.5 12 21.5s4.2 0 6.8-.3c.6-.1 1.9-.1 3-1.3.9-.8 1.2-2.8 1.2-2.8s.3-2.1.3-4.1v-2C23.3 9.1 23 7 23 7zm-13.5 8.4V8.6l8 3.4-8 3.4z"/></svg>유튜브 쇼츠에서 보기</a>`
    :'<div class="novid">🎬 영상 준비 중이에요</div>';
  document.getElementById('db').innerHTML=`
    <div class="dhero">
      <div class="dbm" id="dbm2" onclick="togBm()">${isBm(item.ID)?'🧡':'🤍'}</div>
      <div class="dhero-hanja">${item['한자 성어']||''}</div>
      <div class="dhero-kor">${item['한글 독음']||''}</div>
      <div class="dhero-tags"><span class="dtag">${item.Category||''}</span><span class="dtag">${lvL(item.Level)} Lv.${item.Level}</span></div>
    </div>
    <div class="dbody">
      <div class="dc"><div class="dct">한자 뜻풀이</div><div class="dcv">${item['개별 한자 뜻풀이']||''}</div></div>
      <div class="dc"><div class="dct">의미</div><div class="dcv big">${item['의미 (뜻풀이)']||''}</div></div>
      <div class="dc"><div class="dct">유튜브 쇼츠</div>${vidHtml}</div>
      <div class="dc"><div class="dct">블로그에서 더 공부하기</div><a class="blogbtn" href="${bsUrl}" target="_blank"><svg viewBox="0 0 24 24" fill="white" width="16" height="16"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>네이버 블로그 바로가기</a></div>
      ${(item['호랑이_해설']||item['토끼_해설'])?`<div class="dc"><div class="dct">캐릭터 해설</div>${item['호랑이_해설']?`<div class="cb"><div class="cav">🐯</div><div><div class="cn">호랑이 선생님</div><div class="ct">${item['호랑이_해설']}</div></div></div>`:''}${item['토끼_해설']?`<div class="cb"><div class="cav">🐰</div><div><div class="cn">선비토끼</div><div class="ct">${item['토끼_해설']}</div></div></div>`:''}</div>`:''}
      <button class="bmtog ${isBm(item.ID)?'on':''}" id="bmb" onclick="togBm()">${isBm(item.ID)?'🧡 복습 노트에서 제거':'🤍 복습 노트에 추가'}</button>
    </div>`;
  document.getElementById('ds').classList.add('on');
}

function closeDet(){
  document.getElementById('ds').classList.remove('on');
  const ifr=document.getElementById('db').querySelector('iframe');
  if(ifr)ifr.src='';
}

function togBm(){
  if(!cur)return;
  const id=cur.ID;
  if(isBm(id))bms=bms.filter(b=>b!==id);else bms.push(id);
  localStorage.setItem('saja_bm',JSON.stringify(bms));
  document.getElementById('dtbm').textContent=isBm(id)?'🧡':'🤍';
  const b=document.getElementById('bmb');
  if(b){b.textContent=isBm(id)?'🧡 복습 노트에서 제거':'🤍 복습 노트에 추가';b.className='bmtog'+(isBm(id)?' on':'');}
  const b2=document.getElementById('dbm2');if(b2)b2.textContent=isBm(id)?'🧡':'🤍';
  renderList();
}

function goHome(){
  ['ns','is','ds'].forEach(id=>document.getElementById(id).classList.remove('on'));
  ['nh','nn','ni2'].forEach(id=>document.getElementById(id).classList.remove('on'));
  document.getElementById('nh').classList.add('on');
}

function goNote(){
  document.getElementById('ns').classList.add('on');
  document.getElementById('is').classList.remove('on');
  ['nh','nn','ni2'].forEach(id=>document.getElementById(id).classList.remove('on'));
  document.getElementById('nn').classList.add('on');
  renderNote();
}

function goInfo(){
  document.getElementById('is').classList.add('on');
  document.getElementById('ns').classList.remove('on');
  ['nh','nn','ni2'].forEach(id=>document.getElementById(id).classList.remove('on'));
  document.getElementById('ni2').classList.add('on');
  renderInfo();
}

function renderNote(){
  const items=all.filter(d=>isBm(d.ID));
  document.getElementById('ncnt').textContent=items.length+'개';
  const b=document.getElementById('nb2');
  if(!items.length){b.innerHTML='<div class="ne">아직 복습 노트가 비어있어요.<br>사자성어 상세화면에서<br>🤍를 눌러 추가해보세요!</div>';return;}
  b.innerHTML=`<div class="nl">${items.map(item=>`<div class="ni" onclick="openDetFromNote(${item.ID})"><div style="flex:1;min-width:0"><div class="ni-hanja">${item['한자 성어']}</div><div class="ni-kor">${item['한글 독음']}</div><div class="ni-mean">${item['의미 (뜻풀이)']||''}</div></div><div class="lv ${lvC(item.Level)}" style="margin:0 10px;flex-shrink:0"></div><div class="ndel" onclick="event.stopPropagation();rmBm(${item.ID})">×</div></div>`).join('')}</div>`;
}

function openDetFromNote(id){
  const item=all.find(d=>d.ID===id);
  if(item){openDet(item);document.getElementById('ds').style.zIndex=300;}
}
function rmBm(id){bms=bms.filter(b=>b!==id);localStorage.setItem('saja_bm',JSON.stringify(bms));renderNote();renderList();}

function renderInfo(){
  const wv=all.filter(d=>d['유튜브_쇼츠_URL']).length;
  const cats=[...new Set(all.map(d=>d.Category).filter(Boolean))];
  document.getElementById('ib').innerHTML=`
    <div class="ilogo"><div class="ilogo-ic">🐯</div><div class="ilogo-name">하루 1분 사자성어 마스터</div><div class="ilogo-sub">스토리해커 · Storyhacker</div></div>
    <div class="ic"><h3>콘텐츠 현황</h3>
      <div class="ir"><span>전체 사자성어</span><span>${all.length}개</span></div>
      <div class="ir"><span>유튜브 영상</span><span>${wv}개</span></div>
      <div class="ir"><span>카테고리</span><span>${cats.length}개</span></div>
      <div class="ir"><span>복습 노트</span><span>${bms.length}개</span></div>
    </div>
    <div class="ic"><h3>채널 바로가기</h3>
      <a class="ilink yt" href="${YTCH}" target="_blank"><svg viewBox="0 0 24 24" fill="white" width="17" height="17"><path d="M23 7s-.3-2-1.2-2.8c-1.1-1.2-2.4-1.2-3-1.3C16.2 2.8 12 2.8 12 2.8s-4.2 0-6.8.2c-.6.1-1.9.1-3 1.3C1.3 5 1 7 1 7S.7 9.1.7 11.2v2c0 2 .3 4.1.3 4.1s.3 2 1.2 2.8c1.1 1.2 2.6 1.1 3.3 1.2C7.3 21.4 12 21.5 12 21.5s4.2 0 6.8-.3c.6-.1 1.9-.1 3-1.3.9-.8 1.2-2.8 1.2-2.8s.3-2.1.3-4.1v-2C23.3 9.1 23 7 23 7zm-13.5 8.4V8.6l8 3.4-8 3.4z"/></svg>유튜브 쇼츠 채널</a>
      <a class="ilink blog" href="${BLOG}" target="_blank"><svg viewBox="0 0 24 24" fill="white" width="17" height="17"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>네이버 블로그</a>
    </div>
    <div class="icopy">무료 공개 앱 · 광고 없음<br>© 2025 스토리해커 · Storyhacker</div>`;
}

load();
</script>
</body>
</html>
