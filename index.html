<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#5C35CC">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>하루 1분 사자성어 마스터</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --purple:#5C35CC;
  --purple-dark:#4A28B0;
  --purple-light:#EDE9FE;
  --purple-mid:#7C5CE4;
  --amber:#F59E0B;
  --green:#10B981;
  --red:#EF4444;
  --g50:#F9FAFB;--g100:#F3F4F6;--g200:#E5E7EB;
  --g400:#9CA3AF;--g500:#6B7280;--g700:#374151;--g800:#1F2937;--g900:#111827;
  --white:#FFFFFF;
  --rnav:64px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:#EDE9FE;font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;color:var(--g900)}

/* ── 앱 쉘 ── */
#app{display:flex;flex-direction:column;height:100dvh;max-width:430px;margin:0 auto;background:var(--white);position:relative;overflow:hidden}

/* ── 헤더 ── */
.app-header{background:var(--purple);color:white;padding:0 16px;padding-top:var(--safe-top);min-height:56px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.app-header h1{font-size:17px;font-weight:700;flex:1}
.header-badge{font-size:12px;background:rgba(255,255,255,0.2);padding:3px 10px;border-radius:999px}

/* ── 검색 ── */
.search-wrap{background:var(--purple);padding:0 16px 14px;flex-shrink:0}
.search-box{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.18);border-radius:12px;padding:9px 14px}
.search-box input{flex:1;border:none;background:transparent;color:white;font-size:15px;outline:none}
.search-box input::placeholder{color:rgba(255,255,255,0.55)}
.search-box svg{color:rgba(255,255,255,0.7);flex-shrink:0}
.clear-btn{color:rgba(255,255,255,0.7);cursor:pointer;font-size:18px;line-height:1;display:none}

/* ── 필터 ── */
.filter-row{display:flex;gap:7px;padding:11px 16px;overflow-x:auto;flex-shrink:0;scrollbar-width:none;background:var(--white);border-bottom:1px solid var(--g100)}
.filter-row::-webkit-scrollbar{display:none}
.chip{padding:5px 13px;border-radius:999px;font-size:13px;font-weight:500;border:1.5px solid var(--g200);background:var(--white);color:var(--g500);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
.chip.active{background:var(--purple-light);border-color:var(--purple);color:var(--purple)}

/* ── 리스트 ── */
.list-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:4px 0 calc(var(--rnav) + 8px + var(--safe-bot))}
.saja-item{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--g100);cursor:pointer;transition:background .1s}
.saja-item:active{background:var(--g50)}
.item-thumb{width:46px;height:46px;border-radius:10px;object-fit:cover;background:var(--purple-light);flex-shrink:0}
.item-thumb-ph{width:46px;height:46px;border-radius:10px;background:var(--purple-light);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.item-info{flex:1;min-width:0}
.item-hanja{font-size:15px;font-weight:700;color:var(--g900);letter-spacing:.5px}
.item-kor{font-size:13px;color:var(--g500);margin-top:1px}
.item-meaning{font-size:12px;color:var(--g400);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.item-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.lv-dot{width:7px;height:7px;border-radius:50%}
.lv1{background:var(--green)}.lv2{background:var(--amber)}.lv3{background:var(--red)}
.bm-icon{font-size:16px;line-height:1}
.chevron{color:var(--g300)}

/* ── 빈 화면 ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--g400);gap:10px;font-size:14px}

/* ── 하단 네비 ── */
.bottom-nav{position:absolute;bottom:0;left:0;right:0;height:calc(var(--rnav) + var(--safe-bot));padding-bottom:var(--safe-bot);background:var(--white);border-top:1px solid var(--g100);display:flex;align-items:center;z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px;cursor:pointer}
.nav-btn svg{width:22px;height:22px}
.nav-btn span{font-size:10px;font-weight:500}
.nav-btn.active{color:var(--purple)}
.nav-btn:not(.active){color:var(--g400)}

/* ── 슬라이드 스크린 ── */
.screen{position:absolute;inset:0;background:var(--white);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);z-index:200}
.screen.active{transform:translateX(0)}
.screen-header{background:var(--purple);color:white;padding:0 16px;padding-top:var(--safe-top);min-height:56px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.screen-header h2{font-size:17px;font-weight:700;flex:1}
.back-btn{cursor:pointer;padding:8px 8px 8px 0;display:flex;align-items:center}
.scr-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:32px}

/* ── 상세 ── */
.detail-hero{background:linear-gradient(135deg,var(--purple) 0%,var(--purple-mid) 100%);color:white;padding:24px 20px 28px}
.d-hanja{font-size:34px;font-weight:800;letter-spacing:2px;margin-bottom:4px}
.d-kor{font-size:16px;font-weight:500;opacity:.85;margin-bottom:10px}
.d-cat-row{display:flex;gap:8px;flex-wrap:wrap}
.badge{font-size:11px;padding:3px 10px;border-radius:999px;background:rgba(255,255,255,.2);font-weight:600}
.badge.lv{background:rgba(255,255,255,.15)}

.detail-body{padding:0 16px}
.d-card{background:var(--white);border:1px solid var(--g100);border-radius:14px;padding:16px;margin-top:14px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.d-card-title{font-size:12px;font-weight:700;color:var(--purple);letter-spacing:.5px;margin-bottom:10px;text-transform:uppercase}
.d-breakdown{font-size:14px;color:var(--g700);line-height:1.9}
.d-meaning{font-size:15px;color:var(--g800);line-height:1.75;font-weight:500}

/* 영상 */
.video-wrap{border-radius:12px;overflow:hidden;background:#000;position:relative;margin-top:10px}
.video-ratio{padding-top:56.25%}
.video-ratio iframe{position:absolute;inset:0;width:100%;height:100%;border:none}
.no-video{padding:20px;text-align:center;color:var(--g400);font-size:13px}
.yt-btn{display:flex;align-items:center;gap:8px;background:#FF0000;color:white;border-radius:10px;padding:11px 16px;font-size:14px;font-weight:700;cursor:pointer;margin-top:10px;text-decoration:none;justify-content:center}
.yt-btn svg{width:20px;height:20px;flex-shrink:0}

/* 블로그 */
.blog-btn{display:flex;align-items:center;gap:8px;background:#03C75A;color:white;border-radius:10px;padding:11px 16px;font-size:14px;font-weight:700;cursor:pointer;margin-top:10px;text-decoration:none;justify-content:center}
.blog-btn svg{width:20px;height:20px;flex-shrink:0}

/* 캐릭터 */
.char-block{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:1px solid var(--g100)}
.char-block:last-child{border-bottom:none}
.char-av{width:42px;height:42px;border-radius:50%;background:var(--purple-light);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.char-name{font-size:12px;font-weight:700;color:var(--g700);margin-bottom:3px}
.char-text{font-size:14px;color:var(--g600);line-height:1.65}

/* 복습 버튼 */
.bm-toggle{display:flex;align-items:center;gap:8px;border:1.5px solid var(--g200);border-radius:10px;padding:11px 16px;font-size:14px;font-weight:600;cursor:pointer;margin-top:10px;background:var(--white);color:var(--g700);width:100%;justify-content:center;transition:all .15s}
.bm-toggle.active{background:var(--purple-light);border-color:var(--purple);color:var(--purple)}

/* ── 복습 노트 ── */
.note-empty{text-align:center;padding:60px 20px;color:var(--g400);font-size:14px;line-height:1.8}
.note-list{padding:8px 16px}
.note-item{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid var(--g100);cursor:pointer}
.note-item:last-child{border-bottom:none}
.note-item:active{opacity:.7}
.note-hanja{font-size:16px;font-weight:700}
.note-kor{font-size:13px;color:var(--g500);margin-top:1px}
.note-meaning{font-size:12px;color:var(--g400);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px}
.note-del{color:var(--g300);font-size:20px;margin-left:auto;padding:4px 8px;flex-shrink:0}

/* ── 앱 정보 ── */
.info-wrap{padding:20px 16px}
.info-logo{text-align:center;padding:30px 0 20px}
.info-logo-icon{font-size:56px}
.info-logo-name{font-size:20px;font-weight:800;color:var(--purple);margin-top:8px}
.info-logo-sub{font-size:13px;color:var(--g400);margin-top:4px}
.info-card{background:var(--g50);border-radius:14px;padding:16px;margin-bottom:12px}
.info-card h3{font-size:13px;font-weight:700;color:var(--purple);margin-bottom:10px}
.info-row{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;color:var(--g700)}
.info-row span:last-child{font-weight:600;color:var(--g900)}
.info-link{display:flex;align-items:center;gap:8px;padding:12px 14px;border-radius:12px;font-size:14px;font-weight:600;text-decoration:none;margin-bottom:10px;color:white}
.info-link.yt{background:#FF0000}
.info-link.blog{background:#03C75A}
.info-link svg{width:18px;height:18px;flex-shrink:0}
</style>
</head>
<body>
<div id="app">

  <!-- ── 메인: 사자성어 숲 ── -->
  <div id="main-screen">
    <header class="app-header">
      <span style="font-size:22px">🐯</span>
      <h1>하루 1분 사자성어</h1>
      <span class="header-badge" id="count-badge">0개</span>
    </header>
    <div class="search-wrap">
      <div class="search-box">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="search-input" placeholder="한자·독음·뜻 검색…" oninput="onSearch(this.value)">
        <span class="clear-btn" id="clear-btn" onclick="clearSearch()">×</span>
      </div>
    </div>
    <div class="filter-row" id="filter-row">
      <div class="chip active" onclick="setFilter('전체',this)">전체</div>
    </div>
    <div class="list-scroll" id="list-wrap"></div>
  </div>

  <!-- ── 상세 ── -->
  <div class="screen" id="detail-screen">
    <div class="screen-header">
      <div class="back-btn" onclick="closeDetail()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg>
      </div>
      <h2 id="d-title">상세보기</h2>
      <div style="padding:8px 0 8px 8px;cursor:pointer;font-size:22px" id="d-bm-top" onclick="toggleBm()">🤍</div>
    </div>
    <div class="scr-scroll" id="detail-body"></div>
  </div>

  <!-- ── 복습 노트 ── -->
  <div class="screen" id="note-screen">
    <div class="screen-header">
      <h2 style="flex:1">📌 복습 노트</h2>
      <span style="font-size:13px;opacity:.7" id="note-count">0개</span>
    </div>
    <div class="scr-scroll"><div id="note-body"></div></div>
  </div>

  <!-- ── 앱 정보 ── -->
  <div class="screen" id="info-screen">
    <div class="screen-header"><h2 style="flex:1">앱 정보</h2></div>
    <div class="scr-scroll"><div class="info-wrap" id="info-body"></div></div>
  </div>

  <!-- ── 하단 네비 ── -->
  <nav class="bottom-nav">
    <div class="nav-btn active" id="nav-home" onclick="switchTab('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>사자성어 숲</span>
    </div>
    <div class="nav-btn" id="nav-note" onclick="switchTab('note')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
      <span>복습 노트</span>
    </div>
    <div class="nav-btn" id="nav-info" onclick="switchTab('info')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span>앱 정보</span>
    </div>
  </nav>
</div>

<script>
const BLOG_URL = 'https://blog.naver.com/daddygom24';
const YT_CH_URL = 'https://www.youtube.com/@storyhacker';

let allData = [], filtered = [], currentFilter = '전체', currentItem = null;
let bookmarks = JSON.parse(localStorage.getItem('saja_bm') || '[]');

/* ─── 유틸 ─── */
function driveThumb(url) {
  if (!url) return null;
  const m = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  return m ? `https://drive.google.com/thumbnail?id=${m[1]}&sz=w120` : null;
}
function ytId(url) {
  if (!url) return null;
  const m = url.match(/shorts\/([a-zA-Z0-9_-]+)|youtu\.be\/([a-zA-Z0-9_-]+)|[?&]v=([a-zA-Z0-9_-]+)/);
  return m ? (m[1]||m[2]||m[3]) : null;
}
function lvClass(l){ return l==1?'lv1':l==2?'lv2':'lv3'; }
function lvLabel(l){ return l==1?'기초':l==2?'중급':'고급'; }
function isBm(id){ return bookmarks.includes(id); }

/* ─── 데이터 ─── */
async function loadData() {
  const res = await fetch('data.json');
  allData = await res.json();
  buildFilters();
  applyFilter();
}

function buildFilters() {
  const cats = [...new Set(allData.map(d=>d.Category).filter(Boolean))].sort();
  const row = document.getElementById('filter-row');
  cats.forEach(c => {
    const el = document.createElement('div');
    el.className = 'chip';
    el.textContent = c;
    el.onclick = () => setFilter(c, el);
    row.appendChild(el);
  });
}

function setFilter(cat, el) {
  currentFilter = cat;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  applyFilter();
}

function onSearch(q) {
  document.getElementById('clear-btn').style.display = q ? 'block' : 'none';
  applyFilter();
}
function clearSearch() {
  document.getElementById('search-input').value = '';
  document.getElementById('clear-btn').style.display = 'none';
  applyFilter();
}

function applyFilter() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  filtered = allData.filter(d => {
    const matchCat = currentFilter === '전체' || d.Category === currentFilter;
    const matchQ = !q
      || (d['한자 성어']||'').toLowerCase().includes(q)
      || (d['한글 독음']||'').toLowerCase().includes(q)
      || (d['의미 (뜻풀이)']||'').toLowerCase().includes(q)
      || (d['검색_태그']||'').toLowerCase().includes(q);
    return matchCat && matchQ;
  });
  renderList();
  document.getElementById('count-badge').textContent = filtered.length + '개';
}

/* ─── 리스트 렌더 ─── */
function renderList() {
  const wrap = document.getElementById('list-wrap');
  if (!filtered.length) {
    wrap.innerHTML = '<div class="empty"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><p>검색 결과가 없어요</p></div>';
    return;
  }
  const frag = document.createDocumentFragment();
  filtered.forEach(item => {
    const div = document.createElement('div');
    div.className = 'saja-item';
    div.onclick = () => openDetail(item);
    const thumb = driveThumb(item['캐릭터_이미지_URL']);
    const thumbHtml = thumb
      ? `<img class="item-thumb" src="${thumb}" alt="" loading="lazy" onerror="this.outerHTML='<div class=\'item-thumb-ph\'>🐯</div>'">`
      : '<div class="item-thumb-ph">🐯</div>';
    const meaning = (item['의미 (뜻풀이)']||'').substring(0,28) + ((item['의미 (뜻풀이)']||'').length>28?'…':'');
    div.innerHTML = `
      ${thumbHtml}
      <div class="item-info">
        <div class="item-hanja">${item['한자 성어']||''}</div>
        <div class="item-kor">${item['한글 독음']||''}</div>
        <div class="item-meaning">${meaning}</div>
      </div>
      <div class="item-right">
        <div class="lv-dot ${lvClass(item.Level)}"></div>
        <div class="bm-icon">${isBm(item.ID)?'🧡':'🤍'}</div>
      </div>
    `;
    frag.appendChild(div);
  });
  wrap.innerHTML = '';
  wrap.appendChild(frag);
}

/* ─── 상세 ─── */
function openDetail(item) {
  currentItem = item;
  document.getElementById('d-title').textContent = item['한글 독음']||'';
  document.getElementById('d-bm-top').textContent = isBm(item.ID)?'🧡':'🤍';

  const vid = ytId(item['유튜브_쇼츠_URL']);
  const hasBlog = !!BLOG_URL;
  const blogSearchUrl = `${BLOG_URL}?Redirect=Search&jetSearch=${encodeURIComponent(item['한글 독음']||'')}`;

  const videoHtml = vid
    ? `<div class="video-wrap"><div class="video-ratio"><iframe src="https://www.youtube.com/embed/${vid}?rel=0" allowfullscreen allow="autoplay; encrypted-media"></iframe></div></div>
       <a class="yt-btn" href="https://youtube.com/shorts/${vid}" target="_blank">
         <svg viewBox="0 0 24 24" fill="white"><path d="M23 7s-.3-2-1.2-2.8c-1.1-1.2-2.4-1.2-3-1.3C16.2 2.8 12 2.8 12 2.8s-4.2 0-6.8.2c-.6.1-1.9.1-3 1.3C1.3 5 1 7 1 7S.7 9.1.7 11.2v2c0 2 .3 4.1.3 4.1s.3 2 1.2 2.8c1.1 1.2 2.6 1.1 3.3 1.2C7.3 21.4 12 21.5 12 21.5s4.2 0 6.8-.3c.6-.1 1.9-.1 3-1.3.9-.8 1.2-2.8 1.2-2.8s.3-2.1.3-4.1v-2C23.3 9.1 23 7 23 7zm-13.5 8.4V8.6l8 3.4-8 3.4z"/></svg>
         유튜브 쇼츠에서 보기
       </a>`
    : `<div class="no-video">🎬 영상 준비 중이에요</div>`;

  document.getElementById('detail-body').innerHTML = `
    <div class="detail-hero">
      <div class="d-hanja">${item['한자 성어']||''}</div>
      <div class="d-kor">${item['한글 독음']||''}</div>
      <div class="d-cat-row">
        <span class="badge">${item.Category||''}</span>
        <span class="badge lv">${lvLabel(item.Level)} Lv.${item.Level}</span>
      </div>
    </div>
    <div class="detail-body">
      <div class="d-card">
        <div class="d-card-title">한자 뜻풀이</div>
        <div class="d-breakdown">${item['개별 한자 뜻풀이']||''}</div>
      </div>
      <div class="d-card">
        <div class="d-card-title">의미</div>
        <div class="d-meaning">${item['의미 (뜻풀이)']||''}</div>
      </div>
      <div class="d-card">
        <div class="d-card-title">유튜브 쇼츠</div>
        ${videoHtml}
      </div>
      <div class="d-card">
        <div class="d-card-title">블로그에서 더 알아보기</div>
        <a class="blog-btn" href="${blogSearchUrl}" target="_blank">
          <svg viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
          네이버 블로그에서 공부하기
        </a>
      </div>
      ${(item['호랑이_해설']||item['토끼_해설']) ? `
      <div class="d-card">
        <div class="d-card-title">캐릭터 해설</div>
        ${item['호랑이_해설'] ? `<div class="char-block"><div class="char-av">🐯</div><div><div class="char-name">호랑이 선생님</div><div class="char-text">${item['호랑이_해설']}</div></div></div>` : ''}
        ${item['토끼_해설'] ? `<div class="char-block"><div class="char-av">🐰</div><div><div class="char-name">선비토끼</div><div class="char-text">${item['토끼_해설']}</div></div></div>` : ''}
      </div>` : ''}
      <button class="bm-toggle ${isBm(item.ID)?'active':''}" id="bm-btn" onclick="toggleBm()">
        ${isBm(item.ID)?'🧡 복습 노트에서 제거':'🤍 복습 노트에 추가'}
      </button>
    </div>
  `;
  document.getElementById('detail-screen').classList.add('active');
}

function closeDetail() {
  document.getElementById('detail-screen').classList.remove('active');
  document.getElementById('detail-body').querySelector('iframe') && 
    (document.getElementById('detail-body').querySelector('iframe').src = '');
}

/* ─── 북마크 ─── */
function toggleBm() {
  if (!currentItem) return;
  const id = currentItem.ID;
  if (isBm(id)) bookmarks = bookmarks.filter(b=>b!==id);
  else bookmarks.push(id);
  localStorage.setItem('saja_bm', JSON.stringify(bookmarks));
  // 상단 아이콘 업데이트
  document.getElementById('d-bm-top').textContent = isBm(id)?'🧡':'🤍';
  // 버튼 업데이트
  const btn = document.getElementById('bm-btn');
  if (btn) {
    btn.textContent = isBm(id)?'🧡 복습 노트에서 제거':'🤍 복습 노트에 추가';
    btn.className = 'bm-toggle' + (isBm(id)?' active':'');
  }
  // 리스트 북마크 아이콘 업데이트
  renderList();
}

/* ─── 탭 전환 ─── */
function switchTab(tab) {
  ['home','note','info'].forEach(t=>document.getElementById('nav-'+t).classList.remove('active'));
  document.getElementById('nav-'+tab).classList.add('active');
  ['note-screen','info-screen'].forEach(s=>document.getElementById(s).classList.remove('active'));
  if (tab==='note') { renderNote(); document.getElementById('note-screen').classList.add('active'); }
  if (tab==='info') { renderInfo(); document.getElementById('info-screen').classList.add('active'); }
}

/* ─── 복습 노트 ─── */
function renderNote() {
  const items = allData.filter(d=>isBm(d.ID));
  document.getElementById('note-count').textContent = items.length+'개';
  const body = document.getElementById('note-body');
  if (!items.length) {
    body.innerHTML = '<div class="note-empty">아직 복습 노트가 비어있어요.<br>사자성어 상세화면에서<br>🤍를 눌러 추가해보세요!</div>';
    return;
  }
  body.innerHTML = `<div class="note-list">${items.map(item=>`
    <div class="note-item" onclick="openDetailFromNote(${item.ID})">
      <div style="flex:1;min-width:0">
        <div class="note-hanja">${item['한자 성어']}</div>
        <div class="note-kor">${item['한글 독음']}</div>
        <div class="note-meaning">${item['의미 (뜻풀이)']||''}</div>
      </div>
      <div class="lv-dot ${lvClass(item.Level)}" style="margin:0 8px;flex-shrink:0"></div>
      <div class="note-del" onclick="event.stopPropagation();removeBm(${item.ID})">×</div>
    </div>`).join('')}
  </div>`;
}

function openDetailFromNote(id) {
  const item = allData.find(d=>d.ID===id);
  if (item) { openDetail(item); document.getElementById('detail-screen').style.zIndex=300; }
}

function removeBm(id) {
  bookmarks = bookmarks.filter(b=>b!==id);
  localStorage.setItem('saja_bm', JSON.stringify(bookmarks));
  renderNote();
  renderList();
}

/* ─── 앱 정보 ─── */
function renderInfo() {
  const total = allData.length;
  const withVideo = allData.filter(d=>d['유튜브_쇼츠_URL']).length;
  const cats = [...new Set(allData.map(d=>d.Category).filter(Boolean))];
  document.getElementById('info-body').innerHTML = `
    <div class="info-logo">
      <div class="info-logo-icon">🐯</div>
      <div class="info-logo-name">하루 1분 사자성어 마스터</div>
      <div class="info-logo-sub">스토리해커 · Storyhacker</div>
    </div>
    <div class="info-card">
      <h3>📊 콘텐츠 현황</h3>
      <div class="info-row"><span>전체 사자성어</span><span>${total}개</span></div>
      <div class="info-row"><span>유튜브 영상</span><span>${withVideo}개</span></div>
      <div class="info-row"><span>카테고리</span><span>${cats.length}개</span></div>
      <div class="info-row"><span>복습 노트</span><span>${bookmarks.length}개</span></div>
    </div>
    <div class="info-card">
      <h3>🔗 채널 바로가기</h3>
      <a class="info-link yt" href="${YT_CH_URL}" target="_blank">
        <svg viewBox="0 0 24 24" fill="white" width="18" height="18"><path d="M23 7s-.3-2-1.2-2.8c-1.1-1.2-2.4-1.2-3-1.3C16.2 2.8 12 2.8 12 2.8s-4.2 0-6.8.2c-.6.1-1.9.1-3 1.3C1.3 5 1 7 1 7S.7 9.1.7 11.2v2c0 2 .3 4.1.3 4.1s.3 2 1.2 2.8c1.1 1.2 2.6 1.1 3.3 1.2C7.3 21.4 12 21.5 12 21.5s4.2 0 6.8-.3c.6-.1 1.9-.1 3-1.3.9-.8 1.2-2.8 1.2-2.8s.3-2.1.3-4.1v-2C23.3 9.1 23 7 23 7zm-13.5 8.4V8.6l8 3.4-8 3.4z"/></svg>
        유튜브 쇼츠 채널
      </a>
      <a class="info-link blog" href="${BLOG_URL}" target="_blank">
        <svg viewBox="0 0 24 24" fill="white" width="18" height="18"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
        네이버 블로그
      </a>
    </div>
    <div style="text-align:center;font-size:12px;color:var(--g400);margin-top:20px;line-height:1.8">
      무료 공개 앱 · 광고 없음<br>
      © 2025 스토리해커 · Storyhacker
    </div>
  `;
}

loadData();
</script>
</body>
</html>
